<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Exam System</title>
<style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0; padding: 0;
    background: linear-gradient(135deg,#d5b3d2,#0ca16d,#c8c7d2);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    color: #fff;
  }
  @keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }
  .container {
    max-width: 800px;
    margin: 20px auto;
    background: rgba(20, 32, 7, 0.8);
    padding: 20px;
    border-radius: 30px;
    box-shadow: 0 10px 30px rgba(18, 5, 5, 0.5);
    width: 92%;
    box-sizing: border-box;
  }
  input, select, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    box-sizing: border-box;
    font-size: 16px;
  }
  button {
    background: #510762;
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  button:hover { background: #009e8e; transform: translateY(-2px); }
  button:disabled { background: #555 !important; cursor: not-allowed; }
  .hidden {display: none !important;}
  
  .table-container { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background: #fff;
    color: #000;
    border-radius: 10px;
    overflow: hidden;
  }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
  
  .question-block {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 15px;
    border-left: 5px solid #0ca16d;
    position: relative;
  }

  .option-container {
    display: flex;
    align-items: center;
    margin: 10px 0;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    cursor: pointer;
  }
  .option-container input[type="radio"] {
    width: 20px;
    height: 20px;
    margin: 0 15px 0 0;
    flex-shrink: 0;
    cursor: pointer;
  }
  .option-text {
    font-size: 16px;
    line-height: 1.4;
    word-break: break-word;
  }

  img { width:80px; height:80px; border-radius:50%; display: block; margin: 0 auto 10px; }
  .management-card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .score-card {
    text-align: center;
    padding: 40px;
    background: #fff;
    color: #333;
    border-radius: 20px;
    margin-top: 20px;
  }
  .score-circle {
    font-size: 48px;
    font-weight: bold;
    color: #0ca16d;
    margin: 20px 0;
  }
  .btn-del { width: auto; background: #e74c3c; padding: 5px 15px; float: right; }
  .btn-add { background: #27ae60; margin-bottom: 15px; }
  
  #timerDisplay {
    font-size: 20px;
    background: #e74c3c;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    margin-bottom: 15px;
    font-weight: bold;
  }
  .nav-controls { display: flex; gap: 10px; margin-top: 20px; }
  .btn-nav { background: #2980b9; }
  .q-ans { background: #333; color: #fff; }

  #cheatOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.98); z-index: 9999;
    display: flex; align-items: center; justify-content: center; text-align: center;
    padding: 20px;
  }
  .lock-box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #e74c3c; max-width: 500px; width: 100%; }
</style>
</head>
<body>

<div id="cheatOverlay" class="hidden">
    <div class="lock-box">
        <h1 style="color:#e74c3c; margin-top:0;">EXAM LOCKED</h1>
        <p>Security violation detected. This incident has been logged.</p>
        <p><strong>The instructor must enter the passcode to resume.</strong></p>
        <input type="password" id="unlockPassInput" placeholder="Enter Instructor Password" style="color:#000;">
        <button id="unlockExamBtn" style="background:#27ae60; margin-top:10px;">Unlock & Resume</button>
    </div>
</div>

<div class="container" id="loginContainer">
  <img src="seyoum.jpg" alt="Seyoum Nigussie">
  <h2 style="text-align:center;">Online Exam System</h2>
  
  <h3>Instructor Login</h3>
  <input type="password" id="instructorPassword" placeholder="Enter Password">
  <button id="instructorLoginBtn">Login to Dashboard</button>
  
  <hr>
  
  <h3>Student Login</h3>
  <label>Select Section:</label>
  <select id="sectionSelectStudent">
    <option value="">-- Choose Section --</option>
    <option value="Section_A">Section A (Mechanical)</option>
    <option value="Section_C">Section C (Electrical)</option>
    <option value="Section_D">Section D (Electrical)</option>
    <option value="Section_E">Section E (Electrical)</option>
    <option value="Section_8">Section 8 (Freshman)</option>
  </select>
  <label>Select Your Name:</label>
  <select id="studentSelect">
    <option value="">-- Select Section First --</option>
  </select>
  
  <label>Select Exam:</label>
  <select id="studentExamSelect">
    <option value="Engineering Thermodynamics">Engineering Thermodynamics</option>
    <option value="Fluid mechanics">Emerging Technology</option>
    <option value="Turbomachinery">Turbomachinery</option>
  </select>
  <button id="studentLoginBtn">Login as Student</button>
</div>

<div class="container hidden" id="instructorPanel">
  <div style="display:flex; justify-content: space-between; align-items: center;">
    <h2>Instructor Dashboard</h2>
    <button id="logoutInstructor" style="width: auto; background: #e74c3c;">Logout</button>
  </div>
  <div class="management-card">
    <h3>Student Results</h3>
    <div class="table-container">
      <div id="studentResults"></div>
    </div>
  </div>
</div>

<div class="container hidden" id="studentExamPage">
  <div id="timerDisplay">Time Remaining: 10:00</div>
  <div style="display:flex; justify-content: space-between; align-items:center;">
    <h2 id="examTitle" style="font-size: 1.2rem;"></h2>
    <div id="studentInfoDisplay" style="text-align: right; color: #0ca16d; font-weight: bold;"></div>
  </div>
  
  <div id="examQuestions"></div>

  <div class="nav-controls" id="studentNavControls">
      <button id="prevBtn" class="btn-nav">Previous</button>
      <button id="nextBtn" class="btn-nav">Next</button>
  </div>

  <button id="submitExamBtn" class="hidden" style="background: #27ae60; margin-top: 20px;">Submit Exam</button>
  
  <div id="finalScoreView" class="hidden">
      <div class="score-card">
          <h3>Exam Completed!</h3>
          <div class="score-circle" id="displayScoreValue">0 / 0</div>
          <button onclick="location.reload()">Back to Home</button>
      </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
  import { getDatabase, ref, set, get, child, push, serverTimestamp, onValue, remove } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAQt0xCxcXJHHg5O-J6dzAdwQ6RxofscFo",
    authDomain: "exam-67a68.firebaseapp.com",
    projectId: "exam-67a68",
    storageBucket: "exam-67a68.firebasestorage.app",
    messagingSenderId: "8047123325",
    appId: "1:8047123325:web:438c018b4809dfb92e8a14",
    measurementId: "G-5PSY50N9C0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app); 

  let examTimer;
  let currentQuestionIndex = 0;
  let totalQuestions = 0;
  let examActive = false; 
  let activeStudent = null;
  let currentExamName = ""; // Fixed: Global variable to track the exam name

  const SECRET_SALT = "AASTU_EE_SECURE_2026"; 
  async function hashData(value) {
    const msgUint8 = new TextEncoder().encode(value.toString() + SECRET_SALT);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  document.getElementById("studentLoginBtn").onclick = async () => {
    const section = document.getElementById("sectionSelectStudent").value;
    const raw = document.getElementById("studentSelect").value;
    currentExamName = document.getElementById("studentExamSelect").value; // Store the exam name
    
    if (!section || !raw) return alert("Select section and name");

    const data = JSON.parse(raw);
    activeStudent = data;
    
    const examSnap = await get(child(ref(db), "exams/" + currentExamName));
    if (!examSnap.exists()) return alert("Exam questions not found.");

    prepareExamUI(examSnap.val());
  };

  function prepareExamUI(questions) {
    document.getElementById("loginContainer").classList.add("hidden");
    document.getElementById("studentExamPage").classList.remove("hidden");
    document.getElementById("studentInfoDisplay").innerText = `${activeStudent.fName} ${activeStudent.lName}`;
    
    examActive = true; 
    totalQuestions = questions.length;
    currentQuestionIndex = 0;
    const qContainer = document.getElementById("examQuestions");
    qContainer.innerHTML = "";
    
    questions.forEach((q, i) => {
      const optionsHtml = q.options.map((opt, j) => `
        <label class="option-container">
          <input type="radio" name="q${i}" value="${j+1}"> 
          <span class="option-text">${opt}</span>
        </label>
      `).join('');
      
      qContainer.innerHTML += `
        <div class="student-q-wrapper hidden">
          <div class="question-block">
            <p style="font-weight:bold; margin-bottom:15px;">Q${i+1}: ${q.question}</p>
            ${optionsHtml}
          </div>
        </div>`;
    });
    
    showQuestion(0);
    startTimer(600); 

    document.getElementById("submitExamBtn").onclick = async () => {
      examActive = false; 
      clearInterval(examTimer);
      
      let score = 0;
      for (let i = 0; i < questions.length; i++) {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if (sel && await hashData(sel.value) === questions[i].answer) score++;
      }
      
      // Fixed: Use currentExamName instead of reading from dropdown again
      await push(ref(db, "results"), { 
        firstName: activeStudent.fName, 
        lastName: activeStudent.lName, 
        id: activeStudent.id, 
        exam: currentExamName, 
        score: score, 
        total: questions.length, 
        finishedAt: new Date().toLocaleTimeString(), 
        serverTime: serverTimestamp() 
      });

      document.getElementById("examQuestions").classList.add("hidden");
      document.getElementById("studentNavControls").classList.add("hidden");
      document.getElementById("submitExamBtn").classList.add("hidden");
      document.getElementById("timerDisplay").classList.add("hidden");
      document.getElementById("displayScoreValue").innerText = `${score} / ${questions.length}`;
      document.getElementById("finalScoreView").classList.remove("hidden");
    };
  }

  function showQuestion(index) {
      document.querySelectorAll(".student-q-wrapper").forEach((q, i) => q.classList.toggle("hidden", i !== index));
      document.getElementById("prevBtn").disabled = (index === 0);
      const isLast = (index === totalQuestions - 1);
      document.getElementById("nextBtn").classList.toggle("hidden", isLast);
      document.getElementById("submitExamBtn").classList.toggle("hidden", !isLast);
  }

  document.getElementById("nextBtn").onclick = () => { if (currentQuestionIndex < totalQuestions - 1) showQuestion(++currentQuestionIndex); };
  document.getElementById("prevBtn").onclick = () => { if (currentQuestionIndex > 0) showQuestion(--currentQuestionIndex); };

  function startTimer(seconds) {
    let timeRemaining = seconds;
    examTimer = setInterval(() => {
        document.getElementById("timerDisplay").innerText = `Time: ${Math.floor(timeRemaining/60)}:${(timeRemaining%60).toString().padStart(2, '0')}`;
        if (timeRemaining-- <= 0) { clearInterval(examTimer); document.getElementById("submitExamBtn").click(); }
    }, 1000);
  }

  document.getElementById("sectionSelectStudent").onchange = async (e) => {
    const snap = await get(child(ref(db), "studentList/" + e.target.value));
    const sel = document.getElementById("studentSelect");
    sel.innerHTML = '<option value="">-- Select Your Name --</option>';
    if(snap.exists()) Object.values(snap.val()).forEach(s => {
      const opt = document.createElement("option");
      opt.value = JSON.stringify({id: s.id, fName: s.firstName, lName: s.lastName});
      opt.textContent = `${s.firstName} ${s.lastName} (${s.id})`;
      sel.appendChild(opt);
    });
  };
</script>
</body>
</html>
